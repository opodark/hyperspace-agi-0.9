# HyperSpace-AGI v6.0 - Docker Compose
# P2P: node-a <-> node-b via GossipService
# OOM fix: NUM_PARALLEL=1, MAX_LOADED_MODELS=1, KEEP_ALIVE=5m

services:
  ollama:
    build:
      context: .
      dockerfile: docker/Dockerfile.ollama
    container_name: hyperspace-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_MAX_QUEUE=512
      - OLLAMA_KEEP_ALIVE=5m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 20s
      timeout: 15s
      retries: 5
      start_period: 30s
    networks:
      - hyperspace-net

  webui:
    build:
      context: .
      dockerfile: docker/Dockerfile.webui
    container_name: hyperspace-webui
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - WEBUI_SECRET_KEY=hyperspace-agi-v60-secret-key
      - ENABLE_SIGNUP=false
      - ENABLE_ADMIN_EXPLORE=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - hyperspace-net

  node:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
    container_name: hyperspace-node
    ports:
      - "8765:8765"
    environment:
      - NODE_API_PORT=8765
      - NODE_ID=node-a
      - NODE_HOST=node
      - OLLAMA_BASE_URL=http://ollama:11434
      - DEFAULT_AGENT_MODEL=qwen2.5:7b
      - DEFAULT_CODER_MODEL=qwen2.5-coder:7b
      - DEFAULT_REASONER_MODEL=batiai/gemma4-12b:q4
      - NODE_PEERS=node-b:8770
      - GOSSIP_INTERVAL_SEC=30
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - hyperspace-net
    volumes:
      - node_a_memory:/node/shared/memory
      - node_a_dreams:/node/runtime/dreams

  node-b:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
    container_name: hyperspace-node-b
    ports:
      - "8770:8770"
    environment:
      - NODE_API_PORT=8770
      - NODE_ID=node-b
      - NODE_HOST=node-b
      - OLLAMA_BASE_URL=http://ollama:11434
      - DEFAULT_AGENT_MODEL=qwen2.5:7b
      - DEFAULT_CODER_MODEL=qwen2.5-coder:7b
      - DEFAULT_REASONER_MODEL=batiai/gemma4-12b:q4
      - NODE_PEERS=node:8765
      - GOSSIP_INTERVAL_SEC=30
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - hyperspace-net
    volumes:
      - node_b_memory:/node/shared/memory
      - node_b_dreams:/node/runtime/dreams

  authority:
    build:
      context: .
      dockerfile: docker/Dockerfile.authority
    container_name: hyperspace-authority
    ports:
      - "8766:8766"
    environment:
      - AUTHORITY_API_PORT=8766
      - OLLAMA_BASE_URL=http://ollama:11434
      - POLICY_ENGINE_VERSION=1
      - MODEL_CATALOG_ENABLED=true
      - ROUTING_STRATEGY=smart-4level
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - hyperspace-net
    volumes:
      - authority_catalog:/authority/authority/catalog
      - authority_policy:/authority/authority/policy

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: hyperspace-worker
    ports:
      - "8767:8767"
    environment:
      - WORKER_API_PORT=8767
      - OLLAMA_BASE_URL=http://ollama:11434
      - DREAM_VALIDATOR_ENABLED=true
      - VALIDATION_VOTE_STORE_ENABLED=true
      - DREAM_REPLAY_ENABLED=true
      - CONTESTED_MEMORY_ENABLED=true
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      node:
        condition: service_healthy
    networks:
      - hyperspace-net
    volumes:
      - worker_votes:/worker/worker/votes
      - worker_dreams:/worker/runtime/dreams
      - worker_memory:/worker/shared/memory

  control-plane:
    build:
      context: .
      dockerfile: docker/Dockerfile.control-plane
    container_name: hyperspace-control-plane
    ports:
      - "8768:8768"
    environment:
      - CONTROL_PLANE_API_PORT=8768
      - OLLAMA_BASE_URL=http://ollama:11434
      - DEFAULT_AGENT_MODEL=qwen2.5:7b
      - DEFAULT_CODER_MODEL=qwen2.5-coder:7b
      - DEFAULT_REASONER_MODEL=batiai/gemma4-12b:q4
      - SMART_ROUTING_ENABLED=true
      - ROUTING_LEVELS=4
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      authority:
        condition: service_healthy
      worker:
        condition: service_healthy
    networks:
      - hyperspace-net
    volumes:
      - cp_runtime:/control-plane/control-plane/runtime

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: hyperspace-dashboard
    ports:
      - "8769:8769"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - CONTROL_PLANE_URL=http://control-plane:8768
      - AUTHORITY_URL=http://authority:8766
      - NODE_URLS=http://node:8765,http://node-b:8770
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    depends_on:
      - ollama
      - control-plane
      - node
    networks:
      - hyperspace-net

volumes:
  ollama_models:
  node_a_memory:
  node_a_dreams:
  node_b_memory:
  node_b_dreams:
  authority_catalog:
  authority_policy:
  worker_votes:
  worker_dreams:
  worker_memory:
  cp_runtime:

networks:
  hyperspace-net:
    driver: bridge
